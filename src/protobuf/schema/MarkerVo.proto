syntax = "proto3";

import "google/protobuf/timestamp.proto";

package kongying;

message MarkerVo {
    uint64 version = 1;
    uint64 id = 2;
    uint64 creator_id = 3;
    optional uint64 create_time = 4;
    uint64 updater_id = 5;
    optional uint64 update_time = 6;
    string marker_title = 8;
    string position = 9;
    string content = 10;
    string picture = 11;
    string video_path = 12;
    int64 refresh_time = 13;
    uint32 hidden_flag = 14;
    repeated MarkerItemLinkVo item_list = 15;
    optional uint64 marker_creator_id = 100;
    optional uint64 picture_creator_id = 101;
    string marker_stamp = 200;
    MarkerExtra extra = 400;
    string linkage_id = 500;
}

message MarkerItemLinkVo {
    uint64 item_id = 1;
    uint64 icon_id = 2;
    uint32 count = 10;
}

// Marker Extra
message MarkerExtra {
    optional MarkerExtraUnderground underground = 1;
    optional MarkerExtraIconOverride icon_override = 2;
    repeated string v_1_6_island = 100;
    optional MarkerExtra28Island v_2_8_island = 101;
}

message MarkerExtraUnderground {
    bool is_underground = 1;
    optional bool is_global = 2;
    repeated string region_levels = 9;
}

message MarkerExtraIconOverride {
    uint64 id = 1;
    float min_zoom = 2;
    float max_zoom = 3;
}

message MarkerExtra28Island {
    string island_name = 1;
    repeated string island_state = 2;
}
